version: "3.8"

services:
  linkwarden:
    image: docker.svc.assistance.bg:6000/assistance/linkwarden:latest
    container_name: linkwarden
    environment:
      - DATABASE_URL=postgresql://linkwarden:${LINKWARDEN_DB_PASSWORD}@linkwarden-db:5432/linkwarden
      - NEXTAUTH_SECRET=${LINKWARDEN_NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://links.svc.assistance.bg
    volumes:
      - linkwarden_data:/data/data
    ports:
      - "3000:3000"
    depends_on:
      linkwarden-db:
        condition: service_healthy
    restart: unless-stopped

  linkwarden-db:
    image: postgres:16-alpine
    container_name: linkwarden-db
    environment:
      - POSTGRES_USER=linkwarden
      - POSTGRES_PASSWORD=${LINKWARDEN_DB_PASSWORD}
      - POSTGRES_DB=linkwarden
    volumes:
      - linkwarden_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkwarden"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  linkwarden_data:
  linkwarden_pgdata:
