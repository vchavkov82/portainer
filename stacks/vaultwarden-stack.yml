version: "3"

services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - vaultwarden_data:/data
    environment:
      - DOMAIN=http://localhost:8085
      - SIGNUPS_ALLOWED=true
      - ADMIN_TOKEN=$$argon2id$$v=19$$m=65540,t=3,p=4$$VGhpc0lzQVNhbHQ$$c29tZXJhbmRvbWhhc2hlZHZhbHVl

volumes:
  vaultwarden_data:
    driver: local

networks:
  default:
    name: vaultwarden_net

